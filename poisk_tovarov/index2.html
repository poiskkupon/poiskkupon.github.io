<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PoiskKupon v3 - Поиск товаров</title>
  <meta name="description" content="Обновленный интерфейс поиска товаров с XML ответами GdeSlon." />
  <script src="categories.js"></script>
  <link rel="stylesheet" href="v3-products.css" />
</head>
<body>
  <header class="v3p-hero">
    <h1>Поиск товаров v3</h1>
    <p>Поиск по XML-каталогу с быстрыми фильтрами, категориями и удобным мобильным интерфейсом.</p>
  </header>

  <section class="v3p-panel">
    <div class="v3p-grid">
      <div class="v3p-field v3p-search-wrap">
        <label for="v3p-search">Запрос</label>
        <input id="v3p-search" class="v3p-input" type="search" placeholder="Например: кроссовки nike" />
      </div>

      <div class="v3p-field v3p-cat-wrap">
        <label for="v3p-category">Категория</label>
        <select id="v3p-category" class="v3p-select">
          <option value="">Все категории</option>
        </select>
      </div>

      <div class="v3p-field v3p-subcat-wrap">
        <label for="v3p-subcategory">Подкатегория</label>
        <select id="v3p-subcategory" class="v3p-select">
          <option value="">Все подкатегории</option>
        </select>
      </div>

      <div class="v3p-action-wrap">
        <button id="v3p-search-btn" class="v3p-btn" type="button">Искать</button>
      </div>

      <div class="v3p-filters">
        <label class="v3p-check">
          <input id="v3p-no-accessories" type="checkbox" checked />
          Без аксессуаров
        </label>
        <label class="v3p-check">
          <input id="v3p-no-aliexpress" type="checkbox" checked />
          Без Aliexpress
        </label>
        <label class="v3p-check">
          <input id="v3p-no-books" type="checkbox" checked />
          Без книг
        </label>
      </div>

      <div id="v3p-meta" class="v3p-meta"></div>
    </div>
  </section>

  <main class="v3p-main">
    <div id="v3p-pagination" class="v3p-pagination"></div>
    <section id="v3p-results" class="v3p-results" aria-live="polite"></section>
  </main>

  <script src="v3-products.js"></script>
</body>
</html>
