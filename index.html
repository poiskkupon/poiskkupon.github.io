<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PoiskKupon v3 - Поиск промокодов и акций</title>
  <meta name="description" content="Современный поиск акций и промокодов PoiskKupon." />
  <link rel="stylesheet" href="v3-coupons.css" />
</head>
<body>
  <header class="v3-hero">
    <h1 class="v3-title">PoiskKupon v3</h1>
    <p class="v3-subtitle">Найдите выгодные акции и промокоды по магазинам и категориям.</p>
    <a class="v3-products-link" href="poisk_tovarov/index.html">Перейти в Поиск Товаров</a>
    <div class="v3-search">
      <input id="v3-search" type="search" placeholder="Поиск по магазинам, акциям и категориям" />
      <button id="v3-search-btn" type="button">Поиск</button>
    </div>
  </header>

  <section class="v3-toolbar">
    <label class="v3-check">
      <input id="v3-promo-only" type="checkbox" />
      Только промокоды
    </label>

    <select id="v3-category" class="v3-select" aria-label="Фильтр категории">
      <option value="all">Все категории</option>
    </select>

    <select id="v3-merchant" class="v3-select" aria-label="Фильтр магазина">
      <option value="all">Все магазины</option>
    </select>

    <div id="v3-count" class="v3-count">Загрузка...</div>
  </section>

  <main class="v3-main">
    <section id="v3-grid" class="v3-grid" aria-live="polite"></section>
  </main>

  <script src="v3-coupons.js"></script>
</body>
</html>
